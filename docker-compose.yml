services:
  hcc:
    image: "ghcr.io/eetu/hcc:main"
    container_name: hcc
    restart: always
    environment:
      - TOMORROW_IO_API_KEY=${TOMORROW_IO_API_KEY}
      - HUE_BRIDGE_ADDRESS=${HUE_BRIDGE_ADDRESS}
      - HUE_BRIDGE_USER=${HUE_BRIDGE_USER}
      - HUE_ROOM_TYPES=${HUE_ROOM_TYPES}
      - LANGUAGE=${LANGUAGE}
      - HCC_DB_PATH=/data/hcc.db
      - HCC_HISTORY_RETENTION_DAYS=90
    volumes:
      - hcc-data:/data
    ports:
      - 3000:3000
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: on-failure
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 900 hcc
volumes:
  hcc-data:
