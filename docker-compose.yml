services:
  halo:
    image: "ghcr.io/eetu/halo:main"
    container_name: halo
    restart: always
    environment:
      - TOMORROW_IO_API_KEY=${TOMORROW_IO_API_KEY}
      - HUE_BRIDGE_ADDRESS=${HUE_BRIDGE_ADDRESS}
      - HUE_BRIDGE_USER=${HUE_BRIDGE_USER}
      - HUE_ROOM_TYPES=${HUE_ROOM_TYPES}
      - LANGUAGE=${LANGUAGE}
      - HALO_DB_PATH=/data/halo.db
      - HALO_HISTORY_RETENTION_DAYS=90
    volumes:
      - halo-data:/data
    ports:
      - 3000:3000
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: on-failure
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 900 halo
volumes:
  halo-data:
